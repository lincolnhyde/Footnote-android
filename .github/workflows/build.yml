name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.5 --distribution-type bin

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon -PappVersionCode=${{ github.run_number }} -PappVersionName=0.2.${{ github.run_number }}

      - name: Rename APK with run number
        run: cp app/build/outputs/apk/debug/app-debug.apk footnote-prototype-${{ github.run_number }}.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: prototype-${{ github.run_number }}
          name: Prototype build ${{ github.run_number }}
          body: |
            Auto-built debug APK from commit ${{ github.sha }}.
            Tap the `.apk` file below to download directly to your phone.
          files: footnote-prototype-${{ github.run_number }}.apk
          prerelease: true
          make_latest: 'true'

      - name: Upload APK as workflow artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: footnote-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
