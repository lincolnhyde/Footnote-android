name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.5 --distribution-type bin

      - name: Build debug APK
        id: build
        run: |
          set -o pipefail
          ./gradlew assembleDebug --no-daemon --stacktrace -PappVersionCode=${{ github.run_number }} -PappVersionName=0.2.${{ github.run_number }} 2>&1 | tee /tmp/build.log

      - name: Surface build log on failure
        if: failure() && steps.build.outcome == 'failure'
        run: |
          {
            echo "## Build failure"
            echo
            echo "### Last 300 lines of gradle output"
            echo
            echo '```'
            tail -n 300 /tmp/build.log || echo "no build.log captured"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Rename APK with run number
        if: success()
        run: cp app/build/outputs/apk/debug/app-debug.apk footnote-prototype-${{ github.run_number }}.apk

      - name: Publish GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: prototype-${{ github.run_number }}
          name: Prototype build ${{ github.run_number }}
          body: |
            Auto-built debug APK from commit ${{ github.sha }}.
            Tap the `.apk` file below to download directly to your phone.
          files: footnote-prototype-${{ github.run_number }}.apk
          prerelease: true
          make_latest: 'true'

      - name: Upload APK as workflow artifact (backup)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: footnote-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
